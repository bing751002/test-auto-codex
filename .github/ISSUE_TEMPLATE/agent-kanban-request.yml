name: Agent Kanban Request
description: 交給公司電腦上的 Codex issue runner 處理需求
title: "[agent-kanban] "
labels:
  - agent-kanban
body:
  - type: markdown
    attributes:
      value: |
        請描述你要 Codex 處理的需求。

        常用指令：

        ```text
        /bot LAPTOP-2PECR7ML
        /allow-push
        ```

        `/bot` 用來指定哪台電腦處理。
        一般情況下，runner 會依照 issue 所在 repo 自動找到或 clone 對應的本機資料夾。
        `/project` 只在你要覆蓋預設本機資料夾時使用。
        `/allow-push` 代表允許 Codex 在完成後 commit 並 push。

  - type: textarea
    id: runner
    attributes:
      label: 指定 runner
      description: 如果你有多台電腦在跑 runner，請指定要處理的電腦。
      value: |
        /bot LAPTOP-2PECR7ML
    validations:
      required: false

  - type: textarea
    id: project
    attributes:
      label: 覆蓋本機 project
      description: 通常留空。只有需要覆蓋 repo 預設資料夾時，才填 `.runner/projects.json` 裡登記過的 project 名稱。
      placeholder: |
        /project agent-kanban-system
    validations:
      required: false

  - type: textarea
    id: request
    attributes:
      label: 需求內容
      description: 說明你要 Codex 做什麼，包含背景、要改的功能、限制。
      placeholder: 例如：幫我在 customer-api 加一個匯出報表功能，支援 CSV，並補測試。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 驗收條件
      description: 完成時應該符合哪些條件。
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: 限制與注意事項
      description: 例如不能動哪些檔案、不能改 API、需要保留相容性、不能上傳敏感資料。
      placeholder: 例如：不要改資料庫 schema；不要提交 .env；測試需使用現有測試框架。
    validations:
      required: false

  - type: checkboxes
    id: git_push
    attributes:
      label: Git 上傳授權
      description: 勾選後 issue body 會包含 `/allow-push`，runner 會允許 Codex commit 並 push。
      options:
        - label: "/allow-push - 允許 Codex commit 並 push / 上傳 git"
          required: false
