name: Agent Kanban Request
description: 交給公司電腦上的 issue runner 處理需求（下拉版，手機友善）
title: "[agent-kanban] "
labels:
  - agent-kanban
body:
  - type: markdown
    attributes:
      value: |
        手機開 issue 時直接點下拉，**不需要打 slash 指令**。

        Runner 依下拉自動處理：哪台電腦、哪個本機資料夾、用 codex 還是 claude-code、是否允許 push。

  - type: dropdown
    id: runner
    attributes:
      label: Runner
      description: 哪台電腦處理此需求。Any 代表任何 runner 都可接。
      options:
        - LAPTOP-2PECR7ML
        - Any
      default: 0
    validations:
      required: true

  - type: dropdown
    id: project
    attributes:
      label: Project
      description: runner 電腦上的本機資料夾。Default 表示用 runner 預設專案。
      options:
        - Default
        - agent-kanban-system
        - ehsn-tv-pd-sh
        - scm
        - faceai
      default: 0
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Engine
      description: 用 codex 或 claude-code 執行任務。Default 表示用 runner 啟動時的預設。
      options:
        - Default
        - codex
        - claude-code
      default: 0
    validations:
      required: true

  - type: dropdown
    id: task_type
    attributes:
      label: Task type
      description: |
        dev：修改 code 的任務（會寫檔案、可能 commit）。
        answer：查詢 / 計算 / 研究類任務（直接回答、不寫檔、不 commit）。
      options:
        - dev (修改 code)
        - answer (查詢／計算／研究)
      default: 0
    validations:
      required: true

  - type: input
    id: localpath
    attributes:
      label: Local path
      description: 進階：若想用不在 Project 清單裡的本機資料夾，填路徑（必須在 runner 的 allowedRoots 內）。一般留空。
      placeholder: "D:\\work\\adhoc-folder"
    validations:
      required: false

  - type: textarea
    id: request
    attributes:
      label: 需求內容
      description: 描述你要 runner 做什麼。背景、目標、要改的功能、限制都寫這。
      placeholder: |
        例：在 customer-api 加一個匯出報表功能，支援 CSV，並補測試。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 驗收條件
      description: 怎樣才算完成。可填可不填。
      placeholder: |
        - 功能可從 /api/export 觸發
        - 測試覆蓋 happy path
    validations:
      required: false

  - type: checkboxes
    id: git_push
    attributes:
      label: Git push
      description: 勾選後 runner 才會允許執行 git add / commit / push。沒勾就只改檔不提交。
      options:
        - label: "/allow-push - 完成後允許 runner commit 並 push"
          required: false
